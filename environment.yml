name: ecotox-qsar
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip=24.2
  - setuptools>=70
  - wheel

  # Core scientific stack
  - numpy=1.26.*
  - pandas=2.2.*
  - scipy=1.13.*
  - scikit-learn=1.5.*
  - statsmodels=0.14.*
  - pyarrow=16.*
  - openpyxl=3.1.*
  - sqlalchemy=2.0.*
  - pyyaml=6.0.*
  - tqdm=4.66.*
  - joblib=1.4.*
  - click=8.1.*
  - rich=13.9.*
  - jinja2=3.1.*
  - networkx=3.3.*

  # Chemistry / QSAR
  - rdkit=2024.03.*

  # Baseline models
  - xgboost=2.1.*
  - lightgbm=4.5.*
  - catboost=1.2.*

  # Deep learning support packages that do not need to resolve the torch runtime in conda
  - tensorboard=2.17.*
  - optuna=4.0.*

  # Visualization / interpretation
  - matplotlib=3.8.*
  - seaborn=0.13.*
  - shap=0.46.*
  - umap-learn=0.5.*

  # Notebook / interactive analysis
  - jupyterlab=4.2.*
  - ipykernel=6.29.*

  # Developer tools
  - pytest=8.3.*
  - pytest-cov=5.0.*
  - ruff=0.6.*
  - black=24.8.*
  - mypy=1.11.*
  - pre-commit=3.8.*
  - pip-tools=7.4.*
